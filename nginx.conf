# Plain HTTP — redirect everything to HTTPS, except the ACME challenge path
# certbot uses for certificate renewal.
server {
    listen 80;
    server_name ciboreale.com www.ciboreale.com;

    location /.well-known/acme-challenge/ {
        root /usr/share/nginx/html;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl;
    server_name ciboreale.com www.ciboreale.com;
    root /usr/share/nginx/html;
    index index.html;

    ssl_certificate     /etc/letsencrypt/live/ciboreale.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/ciboreale.com/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;

    # Allow uploads up to the backend's own 10MB media limit.
    client_max_body_size 12M;

    # Reverse proxy API calls to the backend container.
    location /api/ {
        proxy_pass http://backend:8080/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Uploaded media files served by the backend.
    location /uploads/ {
        proxy_pass http://backend:8080/uploads/;
        proxy_set_header Host $host;
    }

    # SPA fallback — let React Router handle client-side routes.
    location / {
        try_files $uri $uri/ /index.html;
    }
}
